{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">Course Management</h2>

<br>

<div style="text-align:center;">

<a href="{{ url_for('add_course') }}" class="btn">
    Add Course
</a>

</div>

<br>

<table>

<tr>
    <th>ID</th>
    <th>Course Name</th>
    <th>Course Code</th>
    <th>Actions</th>
</tr>

{% for course in courses %}

<tr>

    <td>{{ course.id }}</td>
    <td>{{ course.course_name }}</td>
    <td>{{ course.course_code }}</td>

    <td>

        <a href="{{ url_for('edit_course', id=course.id) }}">
            Edit
        </a>

        |

        <a href="{{ url_for('delete_course', id=course.id) }}"
        onclick="return confirm('Delete this course?');">

            Delete

        </a>

    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
