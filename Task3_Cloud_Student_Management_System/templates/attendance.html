{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">Attendance Management</h2>

<br>

<div style="text-align:center;">

<a href="{{ url_for('add_attendance') }}" class="btn">
    Add Attendance
</a>

</div>

<br>

<table>

<tr>
    <th>ID</th>
    <th>Student ID</th>
    <th>Attendance (%)</th>
    <th>Actions</th>
</tr>

{% for record in attendance_records %}

<tr>

    <td>{{ record.id }}</td>
    <td>{{ record.student_id }}</td>
    <td>{{ record.attendance_percentage }}</td>

    <td>

        <a href="{{ url_for('edit_attendance', id=record.id) }}">
            Edit
        </a>

        |

        <a href="{{ url_for('delete_attendance', id=record.id) }}"
           onclick="return confirm('Delete this attendance record?');">

            Delete

        </a>

    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
