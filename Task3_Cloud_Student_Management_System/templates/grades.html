{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">Grade Management</h2>

<br>

<div style="text-align:center;">
    <a href="{{ url_for('add_grade') }}" class="btn">Add Grade</a>
</div>

<br>

<table>

<tr>
    <th>ID</th>
    <th>Student ID</th>
    <th>Subject</th>
    <th>Grade</th>
    <th>Actions</th>
</tr>

{% for grade in grades %}

<tr>

<td>{{ grade.id }}</td>
<td>{{ grade.student_id }}</td>
<td>{{ grade.subject }}</td>
<td>{{ grade.grade }}</td>

<td>

<a href="{{ url_for('edit_grade', id=grade.id) }}">Edit</a>

|

<a href="{{ url_for('delete_grade', id=grade.id) }}"
onclick="return confirm('Delete this grade?');">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
