{% extends "base.html" %}

{% block title %}
Upload Records
{% endblock %}

{% block content %}

<h1>Upload CSV File</h1>

<p>
Upload a CSV file containing records.
The system will automatically detect duplicate entries and store only unique records.
</p>

<form method="POST" enctype="multipart/form-data">

    <input type="file" name="file" accept=".csv" required>

    <br><br>

    <button type="submit">
        Upload File
    </button>

</form>

{% endblock %}
