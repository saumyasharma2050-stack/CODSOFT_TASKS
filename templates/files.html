<!DOCTYPE html>
<html>

<head>
    <title>My Files</title>
</head>

<body>

<h1>My Uploaded Files</h1>

<hr>

{% if files %}

<ul>

{% for file in files %}

<li>

{{ file }}

<a href="/download/{{ file }}">
    <button>Download</button>
</a>

<a href="/delete/{{ file }}">
    <button>Delete</button>
</a>

</li>

<br>

{% endfor %}

</ul>

{% else %}

<p>No files uploaded yet.</p>

{% endif %}

<br>

<a href="/">Back to Home</a>

</body>

</html>
